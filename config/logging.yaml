handlers:
  - sink: stderr
    level: INFO
    format: "<green>{time:YYYY-MM-DD HH:mm:ss}</green> | <level>{level: <8}</level> | <cyan>{name}</cyan>:<cyan>{line}</cyan> - {message}"
    colorize: true
  - sink: reports/quant.log
    level: DEBUG
    format: "{time:YYYY-MM-DD HH:mm:ss} | {level: <8} | {name}:{line} - {message}"
    rotation: "10 MB"
    retention: "30 days"
    enqueue: true
